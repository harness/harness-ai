name: Sync skills

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone harness-skills
        run: git clone --depth 1 https://github.com/harness/harness-skills ../harness-skills

      - name: Run sync-skills.sh
        run: ./scripts/sync-skills.sh ../harness-skills

      - name: Open or update sync PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-harness-skills
          commit-message: "chore: sync skills from harness/harness-skills"
          title: "chore: sync skills from harness/harness-skills"
          body: |
            Automated sync from `harness/harness-skills` (default branch).

            Generated by `.github/workflows/sync-skills.yml`. Do not edit
            `plugins/*/skills/` directly — edit upstream instead and let this
            workflow open the sync PR.
          labels: skills-sync, automated
          delete-branch: true
